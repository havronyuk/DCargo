spring.datasource.url=jdbc:mysql://${dbIpSourceDCargo}:${dbPortSourceDCargo}/${datasourceDCargo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Moscow&characterEncoding=UTF-8
spring.datasource.username=${usrnmDCargo}
spring.datasource.password=${passwordDCargo}


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false


server.address=${ip}
server.port=${dcargoPort}
