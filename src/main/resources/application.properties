spring.datasource.url=jdbc:mysql://${dbIpSourceDCargo}:${dbPortSourceDCargo}/${datasourceDCargo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Moscow&characterEncoding=UTF-8
spring.datasource.username=${usrnmDCargo}
spring.datasource.password=${passwordDCargo}

# HIKARICP
spring.datasource.hikari.pool-name=DCargoPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.auto-commit=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# LOGS
logging.level.org.springframework.web=debug
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO

# EUREKA
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# SERVER
server.address=${ip}
server.port=${dcargoPort}